<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="100%"
  height="100%"
  fill="none"
>
  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <linearGradient id="foldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0077B6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0.1" />
    </linearGradient>

    <filter
      id="dropShadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%"
    >
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="12"
        flood-color="#0077B6"
        flood-opacity="0.25"
      />
    </filter>
  </defs>

  <!-- Message bubble -->
  <g filter="url(#dropShadow)">
    <path
      d="
        M96 96
        C96 73.9 113.9 56 136 56
        H360
        L456 152
        V376
        C456 398.1 438.1 416 416 416
        H200
        L110 466
        C102 470.5 96 464.5 96 456
        V96
        Z
      "
      fill="url(#bubbleGrad)"
    />

    <!-- Fold highlight -->
    <path
      d="
        M360 56
        V120
        C360 137.6 374.4 152 392 152
        H456
        Z
      "
      fill="url(#foldGrad)"
    />
  </g>

  <!-- Send arrow -->
  <path
    d="
      M190 260
      L305 202
      C312 198.5 317.5 204 314 211
      L256 326
      C253 332 245 332 242 326
      L220 280
      L174 258
      C168 255 168 247 174 244
      Z
    "
    fill="#FFFFFF"
  />
</svg>
