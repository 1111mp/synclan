name: 功能请求 / Feature request
title: '[Feature] '
description: 提出你的功能请求 / Propose your feature request
labels: ['enhancement']
type: 'Feature'

body:
  - type: markdown
    attributes:
      value: |
        ## 在提交问题之前，请确认以下事项：

        1. 请 **确保** 您已经查阅了 [Synclan](https://github.com/1111mp/synclan) 确认软件不存在类似的功能
        2. 请 **确保** [已有的问题](https://github.com/1111mp/synclan/issues?q=is%3Aissue) 中没有人提交过相似 issue，否则请在已有的 issue 下进行讨论
        3. 请 **务必** 给issue填写一个简洁明了的标题，以便他人快速检索
        4. 请 **务必** 按照模板规范详细描述问题，否则 issue 将会被关闭

        ## Before submitting the issue, please make sure of the following checklist:

        1. Please **make sure** you have checked **[Synclan](https://github.com/1111mp/synclan)** to confirm that the feature you are requesting does not already exist.
        2. Please **make sure** no similar issue has already been reported in **[Existing Issues](https://github.com/1111mp/synclan/issues?q=is%3Aissue)**. If you find one, please join the discussion there instead of opening a new issue.
        3. Please **provide** a clear and concise issue title so others can easily find and identify your request.
        4. Please **fill out** the issue template with as much detail as possible. Issues that do not follow the template may be closed.

  - type: textarea
    id: description
    attributes:
      label: 功能描述 / Feature description
      description: 详细清晰地描述你的功能请求 / A clear and concise description of what the feature is
    validations:
      required: true
  - type: textarea
    attributes:
      label: 使用场景 / Use case
      description: 请描述你的功能请求的使用场景 / Please describe the use case of your feature request
    validations:
      required: true
  - type: checkboxes
    id: os-labels
    attributes:
      label: 适用系统 / Target OS
      description: 请选择该功能适用的操作系统（至少选择一个） / Please select the operating system(s) for this feature request (select at least one)
      options:
        - label: windows
        - label: macos
        - label: linux
    validations:
      required: true
