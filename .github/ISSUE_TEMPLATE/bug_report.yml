name: 问题反馈 / Bug report
title: '[BUG] '
description: 反馈你遇到的问题 / Report the issue you are experiencing
labels: ['bug']

body:
  - type: markdown
    attributes:
      value: |
        ## 在提交问题之前，请确认以下事项：

        1. 请 **确保** 您已经查阅了 [常见问题](https://github.com/1111mp/synclan/issues/3)
        2. 请 **确保** [已有的问题](https://github.com/1111mp/synclan/issues?q=is%3Aissue) 中没有人提交过相似 issue，否则请在已有的 issue 下进行讨论
        3. 请 **务必** 给 issue 填写一个简洁明了的标题，以便他人快速检索
        4. 请 **务必** 按照模板规范详细描述问题，否则 issue 将会被直接关闭

        ## Before submitting the issue, please make sure of the following checklist:

        1. Please **make sure** you have read the **[FAQ](https://github.com/1111mp/synclan/issues/3)** before creating an issue.
        2. Please **make sure** no similar issue has already been reported in **[Existing Issues](https://github.com/1111mp/synclan/issues?q=is%3Aissue)**. If you find one, please join the discussion there instead of opening a new issue.
        3. Please **provide** a clear and concise issue title so others can easily find and identify your issue.
        4. Please **fill out** the issue template with as much detail as possible. Issues that do not follow the template may be closed without further notice.

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Describe the bug
      description: 详细清晰地描述你遇到的问题，并配合截图 / Describe the problem you encountered in detail and clearly, and provide screenshots
    validations:
      required: true
  - type: textarea
    attributes:
      label: 软件版本 / Synclan Version
      description: 请提供 Synclan 的具体版本 / Please provide the specific version of Synclan.
      render: text
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤 / To Reproduce
      description: 请提供复现问题的步骤 / Steps to reproduce the behavior
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: 操作系统 / OS
      options:
        - label: Windows
        - label: Linux
        - label: MacOS
    validations:
      required: true
  - type: input
    attributes:
      label: 操作系统版本 / OS Version
      description: 请提供你的操作系统版本，Linux请额外提供桌面环境及窗口系统 / Please provide your OS version, for Linux, please also provide the desktop environment and window system
    validations:
      required: true
  - type: textarea
    attributes:
      label: 日志(勿上传日志文件，请粘贴日志内容) / Log (Do not upload the log file, paste the log content directly)
      description: 请提供完整或相关部分的Debug日志（请在“设置”->“日志等级”调整到debug，并重启生效。日志文件在“系统托盘菜单”->“打开目录”->“日志目录”下） / Please provide the complete debug log (or the relevant portion). Set the log level to Debug in "Settings" → "Log Level", restart the application for the change to take effect, then locate the log files via "System Tray Menu" → "Open Directory" → "Logs Directory".
      placeholder: |
        日志目录一般位于 Synclan 安装目录的 "logs/" 目录中，请将日志内容粘贴到此处。
        Log directory is usually located in the "logs/" directory of the Synclan installation directory, please paste the log content here.
      render: log
    validations:
      required: true
